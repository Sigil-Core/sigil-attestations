# .coderabbit.yaml — sigil-attestations (TypeScript, npm library)

reviews:
  auto_review:
    enabled: true

  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        This is the attestation verification library for Sigil. Published to npm.
        - Cryptographic code requires extra scrutiny: verify Ed25519 operations, JWT validation, and attestation binding logic.
        - Flag any hardcoded keys, secrets, or test credentials outside of test fixtures.
        - Check that verify.ts handles all error paths explicitly (expired, malformed, wrong chain, wrong txCommit).
        - Confirm types.ts exports match the attestation schema in the architecture docs.
        - Flag changes to public API surface — this is a published package.

    - path: "src/verify.ts"
      instructions: |
        Core verification logic. This is security-critical.
        - Every code path must be covered by tests.
        - Flag any early returns that skip validation steps.
        - Verify that attestation expiry, chain binding, and hash binding are all checked.

    - path: "tests/**"
      instructions: |
        - Verify tests cover: valid attestation, expired attestation, wrong chain, wrong hash, malformed JWT, missing fields.
        - Flag any test that stubs out the actual verification logic.
        - Tests should use realistic fixtures, not minimal mocks.

    - path: "package.json"
      instructions: |
        - Confirm version follows semver.
        - Check publish metadata (name, version, main/exports, types, license).
        - Flag missing or overly broad exports.

    - path: "**/*.md"
      instructions: |
        Check for accuracy against the current code. Flag stale references.

  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!*.lock"
